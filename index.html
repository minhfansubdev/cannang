<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Theo Dõi Cân Nặng Nhiều Người - Minh Fansub PTL</title>
    <!-- Google Fonts & FontAwesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-sub: #cbd5e1;
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px; 
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(to right, #7dd3fc, #e0f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: var(--text-sub);
            font-size: 0.95rem;
        }

        /* Bộ lọc người dùng */
        .filter-section {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
            gap: 1rem;
        }

        .filter-section label {
            font-weight: 600;
            color: #bae6fd;
        }

        .filter-section select {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--primary);
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .filter-section select option {
            background: #1e293b;
        }

        /* Layout 2 cột */
        .main-content {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        @media (min-width: 850px) {
            .main-content {
                grid-template-columns: 1fr 1.5fr;
            }
        }

        /* Panel Glassmorphism */
        .panel {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #bae6fd;
        }

        /* Form */
        .form-group {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .form-group label {
            font-size: 0.85rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        .form-group input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--card-border);
            padding: 0.75rem 1rem;
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.2);
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* Chart */
        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        /* Bảng hiển thị */
        .table-responsive {
            overflow-x: auto;
            margin-top: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            color: var(--text-sub);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        td {
            font-size: 0.95rem;
            vertical-align: middle;
        }

        .user-tag {
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-weight: 600;
            color: #fff;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .weight-val {
            font-weight: 700;
            font-size: 1.1rem;
            color: #fff;
        }

        .trend-up { color: var(--danger); font-weight: 600; }
        .trend-down { color: var(--success); font-weight: 600; }
        .trend-flat { color: var(--text-sub); }

        /* Nút thao tác */
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            justify-content: flex-end;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
        }

        .btn-edit { background: rgba(14, 165, 233, 0.1); color: var(--primary); border: 1px solid rgba(14, 165, 233, 0.3); }
        .btn-edit:hover { background: var(--primary); color: white; }

        .btn-trash { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-trash:hover { background: var(--danger); color: white; }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: var(--text-sub);
        }

        footer {
            margin-top: auto;
            padding-top: 3rem;
            text-align: center;
            color: var(--text-sub);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Nhật Ký Cân Nặng Gia Đình & Nhóm</h1>
            <p>Theo dõi quá trình thay đổi vóc dáng cho nhiều người trên cùng một hệ thống</p>
        </header>

        <!-- Bộ lọc -->
        <div class="filter-section">
            <label for="userFilter"><i class="fa-solid fa-filter"></i> Xem báo cáo của:</label>
            <select id="userFilter" onchange="renderApp()">
                <option value="all">Tất cả mọi người</option>
            </select>
        </div>

        <div class="main-content">
            <!-- Nhập dữ liệu -->
            <div class="panel">
                <div class="panel-title"><i class="fa-solid fa-scale-balanced"></i> Cập Nhật Hôm Nay</div>
                <form id="weightForm" onsubmit="addRecord(event)">
                    <div class="form-group">
                        <label>Tên người đo</label>
                        <input type="text" id="personName" placeholder="VD: Nam, Lan, Mẹ..." list="nameSuggestions" required>
                        <datalist id="nameSuggestions"></datalist>
                    </div>
                    <div class="form-group">
                        <label>Ngày đo</label>
                        <input type="date" id="recordDate" required>
                    </div>
                    <div class="form-group">
                        <label>Cân nặng (kg)</label>
                        <input type="number" id="recordWeight" step="0.1" placeholder="VD: 65.5" required>
                    </div>
                    <div class="form-group">
                        <label>Ghi chú (Tập luyện, Ăn uống...)</label>
                        <input type="text" id="recordNote" placeholder="VD: Ăn kiêng ngày 1...">
                    </div>
                    <button type="submit" id="submitBtn" class="btn"><i class="fa-solid fa-plus"></i> Lưu Dữ Liệu</button>
                </form>
            </div>

            <!-- Biểu đồ -->
            <div class="panel">
                <div class="panel-title"><i class="fa-solid fa-chart-line"></i> Biểu Đồ Trực Quan</div>
                <div class="chart-container">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Bảng lịch sử -->
        <div class="panel">
            <div class="panel-title"><i class="fa-solid fa-clock-rotate-left"></i> Lịch Sử Đo</div>
            <div class="table-responsive">
                <table id="weightTable">
                    <thead>
                        <tr>
                            <th>Người Đo</th>
                            <th>Ngày Đo</th>
                            <th>Cân Nặng</th>
                            <th>Biến Động</th>
                            <th>Ghi Chú</th>
                            <th style="text-align: right;">Thao Tác</th>
                        </tr>
                    </thead>
                    <tbody id="weightList">
                        <!-- Render qua JS -->
                    </tbody>
                </table>
            </div>
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fa-solid fa-clipboard-list" style="font-size: 2.5rem; margin-bottom: 1rem; opacity: 0.5;"></i>
                <p>Chưa có dữ liệu nào phù hợp.</p>
            </div>
        </div>
    </div>

    <!-- Bản quyền lập trình -->
    <footer>
        &copy; 2026 Developed by <strong>Minh Fansub PTL</strong>. All rights reserved.
    </footer>

    <script>
        let weightData = JSON.parse(localStorage.getItem('health_weight_tracker_multi')) || [];
        let currentEditId = null;
        let chartInstance = null;

        const chartColors = ['#0ea5e9', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#14b8a6'];

        document.getElementById('recordDate').valueAsDate = new Date();

        function renderApp() {
            updateFiltersAndSuggestions();
            renderTable();
            renderChart();
        }

        function updateFiltersAndSuggestions() {
            const uniqueNames = [...new Set(weightData.map(item => item.name))].sort();
            const filterSelect = document.getElementById('userFilter');
            const currentFilter = filterSelect.value;
            
            filterSelect.innerHTML = '<option value="all">Tất cả mọi người</option>';
            const datalist = document.getElementById('nameSuggestions');
            datalist.innerHTML = '';

            uniqueNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                if (name === currentFilter) option.selected = true;
                filterSelect.appendChild(option);

                const dlOption = document.createElement('option');
                dlOption.value = name;
                datalist.appendChild(dlOption);
            });
        }

        function renderTable() {
            const filterValue = document.getElementById('userFilter').value;
            const listContainer = document.getElementById('weightList');
            const emptyState = document.getElementById('emptyState');
            const table = document.getElementById('weightTable');

            let filteredData = weightData;
            if (filterValue !== 'all') {
                filteredData = weightData.filter(item => item.name === filterValue);
            }

            if (filteredData.length === 0) {
                table.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            table.style.display = 'table';
            emptyState.style.display = 'none';
            listContainer.innerHTML = '';

            filteredData.sort((a, b) => new Date(b.date) - new Date(a.date));

            filteredData.forEach((item) => {
                const personHistory = weightData
                    .filter(d => d.name === item.name)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                
                const currentIndex = personHistory.findIndex(d => d.id === item.id);
                
                let trendInfo = '<span class="trend-flat">-</span>';
                if (currentIndex > 0) {
                    const prevItem = personHistory[currentIndex - 1];
                    const diff = (parseFloat(item.weight) - parseFloat(prevItem.weight)).toFixed(1);
                    
                    if (diff > 0) {
                        trendInfo = `<span class="trend-up"><i class="fa-solid fa-arrow-trend-up"></i> +${diff} kg</span>`;
                    } else if (diff < 0) {
                        trendInfo = `<span class="trend-down"><i class="fa-solid fa-arrow-trend-down"></i> ${diff} kg</span>`;
                    }
                }

                // ĐỊNH DẠNG NGÀY THÁNG TIẾNG VIỆT ĐẦY ĐỦ
                const dateObj = new Date(item.date);
                const day = dateObj.getDate().toString().padStart(2, '0');
                const month = (dateObj.getMonth() + 1).toString().padStart(2, '0');
                const year = dateObj.getFullYear();
                const vietnameseDateStr = `Ngày ${day} tháng ${month} năm ${year}`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="user-tag"><i class="fa-regular fa-user"></i> ${escapeHTML(item.name)}</span></td>
                    <td style="color: #bae6fd; font-weight: 500;">${vietnameseDateStr}</td>
                    <td><span class="weight-val">${item.weight} kg</span></td>
                    <td>${trendInfo}</td>
                    <td style="color: var(--text-sub); font-size: 0.9rem;">${escapeHTML(item.note)}</td>
                    <td style="text-align: right;">
                        <div class="action-buttons">
                            <button class="btn-icon btn-edit" onclick="editRecord('${item.id}')" title="Sửa">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <button class="btn-icon btn-trash" onclick="deleteRecord('${item.id}')" title="Xóa">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </div>
                    </td>
                `;
                listContainer.appendChild(tr);
            });
        }

        function renderChart() {
            const filterValue = document.getElementById('userFilter').value;
            const ctx = document.getElementById('weightChart').getContext('2d');
            
            if (chartInstance) chartInstance.destroy();

            let dataToChart = weightData;
            if (filterValue !== 'all') {
                dataToChart = weightData.filter(item => item.name === filterValue);
            }
            
            // Lấy danh sách ngày duy nhất, xếp tăng dần
            const datesToChart = [...new Set(dataToChart.map(item => item.date))].sort((a, b) => new Date(a) - new Date(b));
            
            // Trục X hiển thị ngắn gọn dạng D/M cho thoáng biểu đồ
            const labels = datesToChart.map(dateStr => {
                const d = new Date(dateStr);
                return `${d.getDate()}/${d.getMonth() + 1}`;
            });

            let namesToDraw = [];
            if (filterValue === 'all') {
                namesToDraw = [...new Set(weightData.map(item => item.name))];
            } else {
                namesToDraw = [filterValue];
            }

            let datasets = namesToDraw.map((name, index) => {
                const personData = weightData.filter(item => item.name === name);
                const color = chartColors[index % chartColors.length];

                const dataPoints = datesToChart.map(date => {
                    const record = personData.find(item => item.date === date);
                    return record ? parseFloat(record.weight) : null;
                });

                return {
                    label: name,
                    data: dataPoints,
                    borderColor: color,
                    backgroundColor: color + '33',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: color,
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    spanGaps: true,
                    tension: 0.3 
                };
            });

            Chart.defaults.color = '#cbd5e1';
            Chart.defaults.font.family = 'Inter';

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { 
                            display: filterValue === 'all',
                            position: 'top',
                            labels: { color: '#f8fafc', usePointStyle: true }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 13 },
                            bodyFont: { size: 14, weight: 'bold' },
                            padding: 10,
                            callbacks: {
                                // ĐỊNH DẠNG NGÀY TIẾNG VIỆT KHI DI CHUỘT VÀO ĐIỂM TRÊN BIỂU ĐỒ
                                title: function(context) {
                                    const dateStr = datesToChart[context[0].dataIndex];
                                    const d = new Date(dateStr);
                                    const day = d.getDate().toString().padStart(2, '0');
                                    const month = (d.getMonth() + 1).toString().padStart(2, '0');
                                    return `Ngày ${day} tháng ${month} năm ${d.getFullYear()}`;
                                },
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.parsed.y + ' kg';
                                }
                            }
                        }
                    },
                    scales: {
                        y: { grid: { color: 'rgba(255, 255, 255, 0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function saveToStorage() {
            localStorage.setItem('health_weight_tracker_multi', JSON.stringify(weightData));
        }

        function addRecord(event) {
            event.preventDefault();
            
            const nameInput = document.getElementById('personName').value.trim();
            const dateInput = document.getElementById('recordDate').value;
            const weightInput = document.getElementById('recordWeight').value;
            const noteInput = document.getElementById('recordNote').value.trim();

            const formattedName = nameInput.charAt(0).toUpperCase() + nameInput.slice(1);

            if (currentEditId !== null) {
                const index = weightData.findIndex(item => item.id === currentEditId);
                if (index !== -1) {
                    weightData[index] = {
                        id: currentEditId,
                        name: formattedName,
                        date: dateInput,
                        weight: weightInput,
                        note: noteInput
                    };
                }
                currentEditId = null;
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Lưu Dữ Liệu';
                submitBtn.style.background = 'var(--primary)';
            } else {
                const existingIndex = weightData.findIndex(item => item.date === dateInput && item.name === formattedName);
                if (existingIndex !== -1) {
                    if (confirm(`Bạn đã nhập dữ liệu cho ${formattedName} vào ngày này rồi. Bạn có muốn cập nhật đè lên cân nặng mới không?`)) {
                        weightData[existingIndex].weight = weightInput;
                        weightData[existingIndex].note = noteInput;
                    } else {
                        return; 
                    }
                } else {
                    weightData.push({
                        id: Date.now().toString(),
                        name: formattedName,
                        date: dateInput,
                        weight: weightInput,
                        note: noteInput
                    });
                }
            }

            document.getElementById('userFilter').value = formattedName;
            
            document.getElementById('recordWeight').value = '';
            document.getElementById('recordNote').value = '';
            document.getElementById('recordDate').valueAsDate = new Date();
            document.getElementById('recordWeight').focus();

            saveToStorage();
            renderApp();
        }

        function editRecord(id) {
            const item = weightData.find(record => record.id === id);
            if (!item) return;

            document.getElementById('personName').value = item.name;
            document.getElementById('recordDate').value = item.date;
            document.getElementById('recordWeight').value = item.weight;
            document.getElementById('recordNote').value = item.note;

            currentEditId = id;

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerHTML = '<i class="fa-solid fa-pen"></i> Cập Nhật Dữ Liệu';
            submitBtn.style.background = '#0284c7'; 

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteRecord(id) {
            if (confirm('Bạn có chắc chắn muốn xóa bản ghi cân nặng này?')) {
                weightData = weightData.filter(item => item.id !== id);
                
                if(currentEditId === id) {
                    currentEditId = null;
                    document.getElementById('weightForm').reset();
                    document.getElementById('recordDate').valueAsDate = new Date();
                    const submitBtn = document.getElementById('submitBtn');
                    submitBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Lưu Dữ Liệu';
                    submitBtn.style.background = 'var(--primary)';
                }

                saveToStorage();
                renderApp();
            }
        }

        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        renderApp();
    </script>
</body>
</html>
